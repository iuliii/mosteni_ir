<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>DJI Thermal Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.4.0/ol.css">

<style>
  :root{
    --accent:#4f46e5;
    --accent-bg:#eef2ff;
    --ink:#1f2430;
    --muted:#6b7280;
    --border:#e5e7eb;
    --panel-shadow:0 8px 24px rgba(15,23,42,.14);
  }

  html,body,#map{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:-apple-system,"Segoe UI",Arial,sans-serif;
  }

  /* ============ TOP TOOLBAR ============ */
  #toolbar{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    display:flex;
    align-items:center;
    gap:2px;
    background:#ffffff;
    border-radius:16px;
    box-shadow:var(--panel-shadow);
    padding:6px 8px;
  }

  .tool-btn{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    width:56px;
    padding:6px 2px 7px;
    border:none;
    background:transparent;
    border-radius:12px;
    cursor:pointer;
    color:var(--ink);
    font-size:11px;
    line-height:1;
    user-select:none;
    transition:background .12s ease;
  }
  .tool-btn:hover{ background:#f3f4f6; }
  .tool-btn svg{ width:20px; height:20px; stroke:var(--ink); fill:none; }
  .tool-btn.active{ background:var(--accent-bg); color:var(--accent); }
  .tool-btn.active svg{ stroke:var(--accent); }

  .tb-divider{
    width:1px;
    align-self:stretch;
    margin:6px 4px;
    background:var(--border);
  }

  #colorSwatch{
    width:20px;height:20px;border-radius:50%;
    border:2px solid #fff;
    box-shadow:0 0 0 1px var(--border);
    cursor:pointer;
  }
  #colorInput{ position:absolute; opacity:0; width:0; height:0; pointer-events:none; }

  /* ============ TOP-RIGHT CONTROLS ============ */
  #topRightControls{
    position:absolute;
    top:14px;
    right:14px;
    z-index:1000;
    display:flex;
    align-items:center;
    gap:8px;
  }

  #listToggle{
    display:flex;
    align-items:center;
    gap:7px;
    height:40px;
    padding:0 14px;
    border-radius:12px;
    background:#fff;
    border:none;
    box-shadow:var(--panel-shadow);
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    font-family:inherit;
  }
  #listToggle svg{ width:18px;height:18px; stroke:var(--ink); fill:none; flex:none; }
  #listToggle.active{ background:var(--accent-bg); color:var(--accent); }
  #listToggle.active svg{ stroke:var(--accent); }

  #settingsToggle{
    width:40px;height:40px;
    border-radius:12px;
    background:#fff;
    border:none;
    box-shadow:var(--panel-shadow);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex:none;
  }
  #settingsToggle svg{ width:20px;height:20px; stroke:var(--ink); fill:none; }

  #thermalPanel{
    position:absolute;
    top:64px;
    right:14px;
    z-index:1000;
    width:200px;
    background:#fff;
    border-radius:14px;
    box-shadow:var(--panel-shadow);
    padding:14px 16px 16px;
    display:none;
  }
  #thermalPanel.open{ display:block; }
  #thermalPanel h3{
    margin:0 0 10px;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
  }
  .ctrl-row{ margin-bottom:12px; }
  .ctrl-label{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-bottom:4px;
  }
  .ctrl-row input[type=range]{ width:100%; }
  .reset-btn{
    border:none; background:none; cursor:pointer;
    color:var(--accent); font-size:12px; padding:0;
  }
  #fullscreenBtn{
    width:100%;
    margin-top:2px;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fafafa;
    cursor:pointer;
    font-size:12px;
    color:var(--ink);
  }

  /* ============ ANNOTATIONS PANEL ============ */
  #annotationsPanel{
    position:absolute;
    top:64px;
    right:14px;
    z-index:1000;
    width:250px;
    max-height:min(60vh,420px);
    background:#fff;
    border-radius:14px;
    box-shadow:var(--panel-shadow);
    padding:14px 12px 12px;
    display:none;
    flex-direction:column;
  }
  #annotationsPanel.open{ display:flex; }
  #annotationsPanel h3{
    margin:0 0 8px 4px;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
  }
  #annotationsList{
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:2px;
    flex:1;
    min-height:0;
  }
  #annotationsEmpty{
    font-size:12px;
    color:var(--muted);
    padding:8px 4px;
  }
  .ann-group{ margin-bottom:2px; }
  .ann-group-header{
    display:flex;
    align-items:center;
    gap:6px;
    padding:7px 6px;
    border-radius:8px;
    cursor:pointer;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink);
  }
  .ann-group-header:hover{ background:#f3f4f6; }
  .ann-group-header .chevron{
    display:inline-flex;
    transition:transform .12s ease;
    color:var(--muted);
    flex:none;
  }
  .ann-group.collapsed .chevron{ transform:rotate(-90deg); }
  .ann-group-header .ann-group-count{
    margin-left:auto;
    background:#f1f2f4;
    color:var(--muted);
    font-size:11px;
    font-weight:600;
    padding:1px 7px;
    border-radius:999px;
  }
  .ann-group-items{
    padding-left:14px;
  }
  .ann-group.collapsed .ann-group-items{ display:none; }

  .ann-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 6px;
    border-radius:8px;
    cursor:pointer;
  }
  .ann-item:hover{ background:#f3f4f6; }
  .ann-swatch{
    width:9px;height:9px;border-radius:50%;
    flex:none;
  }
  .ann-name{
    flex:1;
    font-size:12.5px;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ann-name.untitled{ color:var(--muted); font-style:italic; }
  .ann-btn{
    flex:none;
    width:24px;height:24px;
    border:none;
    background:none;
    border-radius:6px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);
  }
  .ann-btn:hover{ background:#e5e7eb; }
  .ann-btn.hidden-toggle.is-hidden{ color:#c9cdd4; }
  .ann-btn.ann-delete:hover{ background:#fee2e2; color:#dc2626; }

  /* ============ FEATURE EDITOR POPUP ============ */
  #editor{
    position:absolute;
    background:#fff;
    border-radius:14px;
    box-shadow:var(--panel-shadow);
    padding:14px 14px 12px;
    width:230px;
    display:none;
  }
  #editor.open{ display:block; }
  #editor .editor-close{
    position:absolute; top:8px; right:10px;
    border:none; background:none; cursor:pointer;
    font-size:15px; color:var(--muted); line-height:1;
  }
  #editor label{
    display:block;
    font-size:11px;
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 4px;
  }
  #editorName{
    width:100%;
    box-sizing:border-box;
    padding:7px 8px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:13px;
    margin-bottom:12px;
  }
  #descRows{ margin-bottom:6px; }
  .desc-row{
    display:flex;
    gap:6px;
    margin-bottom:6px;
  }
  .desc-row input{
    flex:1;
    box-sizing:border-box;
    padding:6px 8px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:12.5px;
    min-width:0;
  }
  .desc-row button{
    flex:none;
    width:24px;height:24px;
    border:1px solid var(--border);
    background:#fafafa;
    border-radius:6px;
    cursor:pointer;
    color:var(--muted);
    font-size:14px;
    line-height:1;
  }
  .desc-row button:hover{ background:#fee2e2; color:#dc2626; border-color:#fecaca; }

  #addRowBtn{
    width:100%;
    padding:6px;
    margin-top:2px;
    margin-bottom:12px;
    border:1px dashed var(--border);
    border-radius:8px;
    background:none;
    cursor:pointer;
    font-size:12px;
    color:var(--accent);
  }
  #addRowBtn:hover{ background:var(--accent-bg); }

  #perpSection{ margin-bottom:12px; }
  #addPerpendicularBtn{
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    font-size:12.5px;
    font-weight:600;
  }
  #addPerpendicularBtn:hover{ background:#4338ca; }

  #repeatSection{ margin-top:10px; }
  #repeatSection label{
    display:block;
    font-size:11px;
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 4px;
  }
  #repeatSection .repeat-hint{
    font-size:11px;
    color:var(--muted);
    text-transform:none;
    font-weight:400;
    letter-spacing:normal;
    margin:-2px 0 6px;
  }
  .repeat-inputs{
    display:flex;
    gap:6px;
    margin-bottom:6px;
  }
  .repeat-inputs input{
    flex:1;
    width:0;
    box-sizing:border-box;
    padding:7px 8px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:12.5px;
  }
  #repeatGenerateBtn{
    width:100%;
    padding:8px;
    border:1px solid var(--accent);
    border-radius:8px;
    background:var(--accent-bg);
    color:var(--accent);
    cursor:pointer;
    font-size:12.5px;
    font-weight:600;
  }
  #repeatGenerateBtn:hover{ background:#e0e3fc; }

  #placementHint{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    z-index:1001;
    background:var(--ink);
    color:#fff;
    padding:8px 16px;
    border-radius:10px;
    font-size:12.5px;
    font-weight:600;
    box-shadow:var(--panel-shadow);
    display:none;
    pointer-events:none;
    white-space:nowrap;
  }
  #placementHint.open{ display:block; }

  .editor-actions{
    display:flex;
    gap:8px;
  }
  .editor-actions button{
    flex:1;
    padding:8px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:12.5px;
    font-weight:600;
  }
  #saveEditorBtn{ background:var(--accent); color:#fff; }
  #saveEditorBtn:hover{ background:#4338ca; }
  #deleteEditorBtn{ background:#fee2e2; color:#dc2626; }
  #deleteEditorBtn:hover{ background:#fecaca; }

  #coordsSection{ margin-bottom:12px; }

  #rowColSection{ margin-bottom:4px; }
  .row-col-inputs{ display:flex; gap:6px; margin-bottom:8px; }
  .row-col-inputs input{
    flex:1;
    box-sizing:border-box;
    padding:7px 8px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:13px;
    min-width:0;
  }
  #detectRowBtn{
    border:none; background:none; cursor:pointer;
    color:var(--accent); font-size:12px; padding:0;
    margin-bottom:12px; text-align:left;
  }
  #toggleCoordsBtn{
    border:none; background:none; cursor:pointer;
    color:var(--accent); font-size:12px; padding:0; margin-bottom:6px;
  }
  #coordsBox{
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    background:#f9fafb;
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 8px;
    font-family:"SF Mono",Consolas,monospace;
    font-size:11.5px;
    color:var(--ink);
  }
  #coordsBox.open{ display:flex; }
  #copyCoordsBtn{
    flex:none;
    border:none;
    background:none;
    cursor:pointer;
    color:var(--muted);
    font-size:13px;
  }
  #copyCoordsBtn:hover{ color:var(--accent); }

  /* ============ RULER / MEASURE TOOLTIP ============ */
  .measure-tooltip{
    position:relative;
    background:var(--ink);
    color:#fff;
    padding:3px 9px;
    border-radius:6px;
    font-size:11.5px;
    font-weight:700;
    white-space:nowrap;
    pointer-events:none;
    box-shadow:0 2px 6px rgba(15,23,42,.25);
  }

  /* ============ TEMPERATURE POPUP ============ */
  .temp-popup{
    position:relative;
    background:var(--ink);
    color:#fff;
    padding:6px 12px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
    pointer-events:none;
    box-shadow:0 2px 8px rgba(15,23,42,.3);
  }
  .temp-popup.loading{ opacity:0.6; font-weight:500; }

  /* ============ LEGEND ============ */
  #legend{
    position:absolute;
    bottom:20px;
    left:14px;
    z-index:1000;
    background:#fff;
    border-radius:12px;
    box-shadow:var(--panel-shadow);
    padding:10px 12px;
    display:none;
    width:220px;
  }
  #legend.open{ display:block; }
  #legend .legend-title{
    font-size:11px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
  }
  #legend .legend-bar{
    height:14px;
    border-radius:4px;
    margin-bottom:4px;
  }
  #legend .legend-labels{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--ink);
    font-weight:600;
  }
</style>
</head>


<body>

<div id="map"></div>

<!-- ================= TOOLBAR ================= -->
<div id="toolbar">
  <button class="tool-btn" id="tool-select" data-tool="select" title="Select">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3l7 17 2-7 7-2-16-8z"/></svg>
    <span>Select</span>
  </button>

  <button class="tool-btn" id="tool-point" data-tool="Point" title="Point">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-11.5A7 7 0 0 0 5 9.5C5 14.5 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.2"/></svg>
    <span>Point</span>
  </button>

  <button class="tool-btn" id="tool-line" data-tool="LineString" title="Line">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
    <span>Line</span>
  </button>

  <button class="tool-btn" id="tool-polygon" data-tool="Polygon" title="Polygon">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 6-3 10H7L4 9z"/></svg>
    <span>Polygon</span>
  </button>

  <button class="tool-btn" id="tool-rectangle" data-tool="Rectangle" title="Rectangle">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg>
    <span>Rectangle</span>
  </button>

  <button class="tool-btn" id="tool-circle" data-tool="Circle" title="Circle">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/></svg>
    <span>Circle</span>
  </button>

  <button class="tool-btn" id="tool-row" title="Row (fast, auto-numbered)">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    <span>Row</span>
  </button>

  <button class="tool-btn" id="tool-column" title="Column (fast, auto-numbered)">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="4" x2="7" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="17" y1="4" x2="17" y2="20"/></svg>
    <span>Column</span>
  </button>

  <button class="tool-btn" id="tool-ruler" title="Ruler (measure distance)">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l14-14 4 4-14 14z"/><path d="M14 6l2 2"/><path d="M11 9l2 2"/><path d="M8 12l2 2"/><path d="M5 15l2 2"/></svg>
    <span>Ruler</span>
  </button>

  <button class="tool-btn" id="tool-temperature" title="See temperature (click a point on the map)">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13"/><circle cx="12" cy="18" r="3"/><path d="M9 4a3 3 0 0 1 6 0v9.5a5 5 0 1 1-6 0z"/></svg>
    <span>Temp</span>
  </button>

  <div class="tb-divider"></div>

  <button class="tool-btn" id="colorBtn" title="Color">
    <span id="colorSwatch" style="background:#e11d48;"></span>
    <span>Color</span>
  </button>
  <input type="color" id="colorInput" value="#e11d48">

  <div class="tb-divider"></div>

  <button class="tool-btn" id="tool-undo" title="Undo">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7L4 12l5 5"/><path d="M4 12h10a6 6 0 0 1 0 12h-2"/></svg>
    <span>Undo</span>
  </button>

  <button class="tool-btn" id="tool-redo" title="Redo">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7l5 5-5 5"/><path d="M20 12H10A6 6 0 0 0 10 24h2"/></svg>
    <span>Redo</span>
  </button>

  <div class="tb-divider"></div>

  <button class="tool-btn" id="tool-clear" title="Clear all">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>
    <span>Clear</span>
  </button>

  <button class="tool-btn" id="tool-export" title="Export GeoJSON">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
    <span>Export</span>
  </button>
</div>

<!-- ================= ANNOTATIONS LIST ================= -->
<div id="topRightControls">
  <button id="listToggle" title="Annotations list">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    <span>Annotations</span>
  </button>

  <button id="settingsToggle" title="Thermal settings">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<div id="annotationsPanel">
  <h3>Annotations</h3>

  <div class="ctrl-row">
    <div class="ctrl-label"><span>Row / Column opacity</span></div>
    <input id="rowColOpacityInput" type="range" min="0" max="1" step="0.05" value="1">
  </div>

  <div id="annotationsList">
    <div id="annotationsEmpty">No annotations yet.</div>
  </div>
</div>


<div id="thermalPanel">
  <h3>Thermal Controls</h3>

  <div class="ctrl-row">
    <div class="ctrl-label"><span>Opacity</span><button class="reset-btn" id="resetOpacity">Reset</button></div>
    <input id="opacity" type="range" min="0" max="1" step="0.01" value="1">
  </div>

  <div class="ctrl-row">
    <div class="ctrl-label"><span>Brightness</span><button class="reset-btn" id="resetBrightness">Reset</button></div>
    <input id="brightness" type="range" min="-100" max="100" value="0">
  </div>

  <div class="ctrl-row">
    <div class="ctrl-label"><span>Contrast</span><button class="reset-btn" id="resetContrast">Reset</button></div>
    <input id="contrast" type="range" min="0" max="300" value="100">
  </div>

<!-- ================= FEATURE NAME / DESCRIPTION EDITOR ================= -->
<div id="editor">
  <button class="editor-close" id="editorClose">&times;</button>

  <label for="editorName">Name</label>
  <input id="editorName" type="text" placeholder="Untitled">

  <div id="perpSection" style="display:none;">

    <div id="repeatSection">

      <div class="repeat-hint">Down/up and right/left offset per repeat (meters). Use both to go oblique.</div>
      <div class="repeat-inputs">
        <input id="repeatDownInput" type="number" step="0.1" placeholder="Down (m)">
        <input id="repeatRightInput" type="number" step="0.1" placeholder="Right (m)">
      </div>
      <div class="repeat-inputs">
        <input id="repeatCountInput" type="number" min="1" max="200" step="1" placeholder="Count">

      <button id="copyCoordsBtn" title="Copy to clipboard">⧉</button>
    </div>

  <div class="editor-actions">
    <button id="saveEditorBtn">Save</button>
    <button id="deleteEditorBtn">Delete</button>
  </div>
</div>

<div id="placementHint"></div>

<script src="https://cdn.jsdelivr.net/npm/ol@v10.4.0/dist/ol.js"></script>

<script>

// ==========================
// CUSTOM COLORMAP (black -> purple -> orange -> yellow)
// ==========================

// Builds a TiTiler-compatible "explicit" colormap: an object whose keys are
// "value_start,value_end" strings and whose values are [r,g,b,a] arrays.
// TiTiler colors each pixel by finding which [start,end) bucket its raw
// value falls into. We interpolate `steps` buckets evenly across
// [vmin, vmax], and interpolate the color for each bucket across the given
// hex color stops (piecewise-linear, like a CSS gradient).
const VMIN = 22;
const VMAX = 95;
const COLOR_STOPS = ["#000000", "#6d1271", "#efa03b", "#fdff00"];

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function lerp(a, b, t) { return a + (b - a) * t; }

function buildColormap(stops, vmin, vmax, steps = 256) {
  const colors = stops.map(hexToRgb);
  const segments = colors.length - 1;
  const colormap = {};
  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const value = vmin + t * (vmax - vmin);
    const nextT = i === steps - 1 ? 1 : (i + 1) / (steps - 1);
    const nextValue = i === steps - 1 ? vmax + 0.01 : vmin + nextT * (vmax - vmin);

    const segT = t * segments;
    const segIndex = Math.min(Math.floor(segT), segments - 1);
    const localT = segT - segIndex;
    const c0 = colors[segIndex];
    const c1 = colors[segIndex + 1];
    const r = Math.round(lerp(c0[0], c1[0], localT));
    const g = Math.round(lerp(c0[1], c1[1], localT));
    const b = Math.round(lerp(c0[2], c1[2], localT));

    colormap[`${value.toFixed(4)},${nextValue.toFixed(4)}`] = [r, g, b, 255];
  }
  return colormap;
}

const customColormap = buildColormap(COLOR_STOPS, VMIN, VMAX);
const colormapParam = encodeURIComponent(JSON.stringify(customColormap));

// Build the CSS gradient string for the legend bar, reusing the same stops
const legendGradientCss = `linear-gradient(to right, ${COLOR_STOPS.join(", ")})`;


// ==========================
// THERMAL LAYER
// ==========================

const COG_URL = "/data/thermal_qgis_rgb.tif";
const TITILER_BASE = "https://tiles.helioscan.ro";

const tileURL =
  `${TITILER_BASE}/cog/tiles/WebMercatorQuad/{z}/{x}/{y}.png?url=${encodeURIComponent(COG_URL)}&rescale=${VMIN},${VMAX}&colormap=${colormapParam}`;

const thermalLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({
    url: tileURL,
    crossOrigin: "anonymous"
  }),
  opacity: 1
});

let brightness = 0;
let contrast = 100;

//thermalLayer.on("postrender", function (evt) {
  //const ctx = evt.context;
  //ctx.save();
  //ctx.globalCompositeOperation = "source-atop";
  //ctx.filter = `brightness(${100 + brightness}%) contrast(${contrast}%)`;
  //ctx.drawImage(ctx.canvas, 0, 0);
  //ctx.restore();
//});


// ==========================
// ANNOTATION LAYER
// ==========================

const vectorSource = new ol.source.Vector();

let currentColor = "#e11d48";
let rowColOpacity = 1;

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function featureStyle(feature) {
  if (feature.get("hidden")) return [];
  const shape = feature.get("shape");
  const isGuide = shape === "Row" || shape === "Column";
  const color = feature.get("color") || currentColor;
  const alpha = isGuide ? rowColOpacity : 1;

  const styles = [
    new ol.style.Style({
      image: new ol.style.Circle({
        radius: 6,
        fill: new ol.style.Fill({ color: color }),
        stroke: new ol.style.Stroke({ color: "#fff", width: 2 })
      }),
      stroke: new ol.style.Stroke({ color: hexToRgba(color, alpha), width: 2.5 }),
      fill: new ol.style.Fill({ color: hexToRgba(color, 0.18 * alpha) })
    })
  ];

  const name = feature.get("name");
  if (name) {
    let textGeometry;
    if (isGuide) {
      const coords = feature.getGeometry().getCoordinates();
      textGeometry = new ol.geom.Point(coords[0]);
    }
    styles.push(new ol.style.Style({
      geometry: textGeometry,
      text: new ol.style.Text({
        text: name,
        offsetY: -16,
        font: "600 12px -apple-system, Arial, sans-serif",
        fill: new ol.style.Fill({ color: hexToRgba("#1f2430", alpha) }),
        stroke: new ol.style.Stroke({ color: hexToRgba("#ffffff", alpha), width: 3 })
      })
    }));
  }

  return styles;
}

const vectorLayer = new ol.layer.Vector({
  source: vectorSource,
  style: featureStyle
});


// ==========================
// RULER / MEASURE LAYER
// ==========================

const measureSource = new ol.source.Vector();
const measureLayer = new ol.layer.Vector({
  source: measureSource,
  style: new ol.style.Style({
    stroke: new ol.style.Stroke({ color: "#111827", width: 2, lineDash: [6, 6] }),
    image: new ol.style.Circle({
      radius: 4,
      fill: new ol.style.Fill({ color: "#111827" }),
      stroke: new ol.style.Stroke({ color: "#fff", width: 1.5 })
    })
  })
});


const map = new ol.Map({
  target: "map",
  layers: [
    new ol.layer.Tile({ source: new ol.source.OSM() }),
    thermalLayer,
    vectorLayer,
    measureLayer
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([25.497553, 44.203172]),
    zoom: 18
  })
});


// ==========================
// EDITOR POPUP (name + description rows)
// ==========================

const editorEl = document.getElementById("editor");
const editorOverlay = new ol.Overlay({
  element: editorEl,
  positioning: "bottom-left",
  offset: [16, -16],
  stopEvent: true
});
map.addOverlay(editorOverlay);

let activeFeature = null;

function getFeatureAnchor(feature) {
  const geom = feature.getGeometry();
  const type = geom.getType();
  if (type === "Point") return geom.getCoordinates();
  if (type === "Circle") return geom.getCenter();
  return ol.extent.getCenter(geom.getExtent());
}

function renderDescRows(rows) {
  const container = document.getElementById("descRows");
  container.innerHTML = "";
  rows.forEach((val, i) => {
    const row = document.createElement("div");
    row.className = "desc-row";

    const input = document.createElement("input");
    input.type = "text";
    input.value = val;
    input.placeholder = "Detail...";
    input.dataset.index = i;

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "\u2212";
    removeBtn.title = "Remove row";
    removeBtn.onclick = () => {
      rows.splice(i, 1);
      renderDescRows(rows);
    };

    row.appendChild(input);
    row.appendChild(removeBtn);
    container.appendChild(row);
  });
}

let editingRows = [];

function openEditor(feature) {
  activeFeature = feature;
  document.getElementById("editorName").value = feature.get("name") || "";
  editingRows = (feature.get("description") || []).slice();
  renderDescRows(editingRows);

  const isPoint = feature.getGeometry().getType() === "Point";
  const shape = feature.get("shape");

  const perpSection = document.getElementById("perpSection");
  const addPerpendicularBtn = document.getElementById("addPerpendicularBtn");
  if (shape === "Row" || shape === "Column") {
    perpSection.style.display = "";
    addPerpendicularBtn.textContent = shape === "Row" ? "➕ Add Column" : "➕ Add Row";
  } else {
    perpSection.style.display = "none";
  }

  const rowColSection = document.getElementById("rowColSection");
  rowColSection.style.display = isPoint ? "" : "none";
  document.getElementById("editorRow").value = feature.get("row") || "";
  document.getElementById("editorColumn").value = feature.get("column") || "";

  const coordsSection = document.getElementById("coordsSection");
  const coordsBox = document.getElementById("coordsBox");
  const toggleCoordsBtn = document.getElementById("toggleCoordsBtn");
  coordsBox.classList.remove("open");
  toggleCoordsBtn.textContent = "📍 Show coordinates";

  if (isPoint) {
    coordsSection.style.display = "";
    const lonLat = ol.proj.toLonLat(feature.getGeometry().getCoordinates());
    document.getElementById("coordsText").textContent =
      lonLat[1].toFixed(6) + ", " + lonLat[0].toFixed(6);
  } else {
    coordsSection.style.display = "none";
  }

  editorOverlay.setPosition(getFeatureAnchor(feature));
  editorEl.classList.add("open");
}

function closeEditor() {
  editorEl.classList.remove("open");
  editorOverlay.setPosition(undefined);
  activeFeature = null;
}

document.getElementById("addRowBtn").onclick = () => {
  editingRows.push("");
  renderDescRows(editingRows);
};

document.getElementById("editorClose").onclick = closeEditor;

document.getElementById("toggleCoordsBtn").onclick = function () {
  const box = document.getElementById("coordsBox");
  const isOpen = box.classList.toggle("open");
  this.textContent = isOpen ? "📍 Hide coordinates" : "📍 Show coordinates";
};

document.getElementById("copyCoordsBtn").onclick = function () {
  const text = document.getElementById("coordsText").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const original = this.textContent;
    this.textContent = "✓";
    setTimeout(() => { this.textContent = original; }, 900);
  }).catch(() => {});
};

document.getElementById("detectRowBtn").onclick = function () {
  if (!activeFeature) return;
  const coord = activeFeature.getGeometry().getCoordinates();

  function lineOffset(line, axis) {
    const coords = line.getGeometry().getCoordinates();
    const [x1, y1] = coords[0];
    const [x2, y2] = coords[1];
    if (axis === "row") {
      const dx = x2 - x1;
      if (Math.abs(dx) < 1e-6) {
        const cp = line.getGeometry().getClosestPoint(coord);
        return Math.hypot(cp[0] - coord[0], cp[1] - coord[1]);
      }
      const t = (coord[0] - x1) / dx;
      const yInterp = y1 + t * (y2 - y1);
      return Math.abs(coord[1] - yInterp);
    } else {
      const dy = y2 - y1;
      if (Math.abs(dy) < 1e-6) {
        const cp = line.getGeometry().getClosestPoint(coord);
        return Math.hypot(cp[0] - coord[0], cp[1] - coord[1]);
      }
      const t = (coord[1] - y1) / dy;
      const xInterp = x1 + t * (x2 - x1);
      return Math.abs(coord[0] - xInterp);
    }
  }

  function closestLabel(shape, axis) {
    const lines = vectorSource.getFeatures().filter((f) => f.get("shape") === shape);
    if (lines.length === 0) return null;
    let best = null;
    let bestDist = Infinity;
    lines.forEach((line) => {
      const dist = lineOffset(line, axis);
      if (dist < bestDist) {
        bestDist = dist;
        best = line;
      }
    });
    const match = /(\d+)/.exec(best.get("name") || "");
    return match ? match[1] : (best.get("name") || "");
  }

  const rowResult = closestLabel("Row", "row");
  const columnResult = closestLabel("Column", "column");

  if (rowResult === null && columnResult === null) {
    const original = this.textContent;
    this.textContent = "No Row or Column lines found — draw some first";
    setTimeout(() => { this.textContent = original; }, 2200);
    return;
  }

  if (rowResult !== null) document.getElementById("editorRow").value = rowResult;
  if (columnResult !== null) document.getElementById("editorColumn").value = columnResult;
};

document.getElementById("saveEditorBtn").onclick = () => {
  if (!activeFeature) return;
  const rowInputs = document.querySelectorAll("#descRows input");
  const rows = Array.from(rowInputs).map(i => i.value).filter(v => v.trim() !== "");
  activeFeature.set("name", document.getElementById("editorName").value.trim());
  activeFeature.set("description", rows);
  activeFeature.set("row", document.getElementById("editorRow").value.trim());
  activeFeature.set("column", document.getElementById("editorColumn").value.trim());
  vectorLayer.changed();
  renderAnnotationsList();
  closeEditor();
};

document.getElementById("deleteEditorBtn").onclick = () => {
  if (!activeFeature) return;
  vectorSource.removeFeature(activeFeature);
  closeEditor();
};


// ==========================
// PERPENDICULAR ROW/COLUMN CREATION
// ==========================

const PERP_LENGTH_PX = 56;

function perpLengthMapUnits() {
  const resolution = map.getView().getResolution() || 1;
  return resolution * PERP_LENGTH_PX;
}

let pendingPerpendicular = null;

function showPlacementHint(text) {
  const el = document.getElementById("placementHint");
  el.textContent = text + "  (Esc to cancel)";
  el.classList.add("open");
}

function hidePlacementHint() {
  document.getElementById("placementHint").classList.remove("open");
}

function beginAddPerpendicular(feature) {
  const shape = feature.get("shape");
  if (shape !== "Row" && shape !== "Column") return;
  pendingPerpendicular = { feature, newShape: shape === "Row" ? "Column" : "Row" };
  closeEditor();
  clearInteractions();
  map.getTargetElement().style.cursor = "crosshair";
  showPlacementHint(
    shape === "Row" ? "Click along the row to place a column" : "Click along the column to place a row"
  );
}

function cancelAddPerpendicular() {
  pendingPerpendicular = null;
  map.getTargetElement().style.cursor = "";
  hidePlacementHint();
  activateSelect(document.getElementById("tool-select"));
}

map.on("click", (evt) => {
  if (pendingPerpendicular) {
    const { feature, newShape } = pendingPerpendicular;
    const shape = feature.get("shape");

    const closest = feature.getGeometry().getClosestPoint(evt.coordinate);
    const half = perpLengthMapUnits() / 2;

    const newCoords = shape === "Row"
      ? [[closest[0], closest[1] - half], [closest[0], closest[1] + half]]
      : [[closest[0] - half, closest[1]], [closest[0] + half, closest[1]]];

    const newFeature = new ol.Feature({ geometry: new ol.geom.LineString(newCoords) });
    newFeature.set("color", feature.get("color") || currentColor);
    newFeature.set("shape", newShape);
    newFeature.set("name", newShape + " " + nextAnnotationNumber(newShape, newShape));
    newFeature.set("description", []);
    vectorSource.addFeature(newFeature);

    pendingPerpendicular = null;
    map.getTargetElement().style.cursor = "";
    hidePlacementHint();

    activateSelect(document.getElementById("tool-select"));
    openEditor(newFeature);
    return;
  }

  if (temperatureModeActive) {
    handleTemperatureClick(evt.coordinate);
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (pendingPerpendicular) {
    cancelAddPerpendicular();
  } else if (measureDraw) {
    measureDraw.abortDrawing();
  }
});

document.getElementById("addPerpendicularBtn").onclick = () => {
  if (!activeFeature) return;
  beginAddPerpendicular(activeFeature);
};


// ==========================
// BULK REPEAT (draw one row/column, auto-generate the rest — straight or oblique)
// ==========================

function metersToMapUnitsAt(coordinate, meters) {
  const lonLat = ol.proj.toLonLat(coordinate);
  const latRad = (lonLat[1] * Math.PI) / 180;
  const scale = 1 / Math.cos(latRad);
  return meters * scale;
}

function repeatFeature(feature, downM, rightM, count) {
  const shape = feature.get("shape");
  if (shape !== "Row" && shape !== "Column") return [];

  const coords = feature.getGeometry().getCoordinates();
  const anchor = coords[0];
  const rightUnits = metersToMapUnitsAt(anchor, rightM);
  const downUnits = metersToMapUnitsAt(anchor, downM);
  const created = [];

  for (let i = 1; i <= count; i++) {
    const offX = rightUnits * i;
    const offY = -downUnits * i;
    const newCoords = coords.map(([x, y]) => [x + offX, y + offY]);
    const newFeature = new ol.Feature({ geometry: new ol.geom.LineString(newCoords) });
    newFeature.set("color", feature.get("color") || currentColor);
    newFeature.set("shape", shape);
    newFeature.set("name", shape + " " + nextAnnotationNumber(shape, shape));
    newFeature.set("description", []);
    vectorSource.addFeature(newFeature);
    created.push(newFeature);
  }
  return created;
}

document.getElementById("repeatGenerateBtn").onclick = function () {
  if (!activeFeature) return;
  const btn = this;
  const down = parseFloat(document.getElementById("repeatDownInput").value) || 0;
  const right = parseFloat(document.getElementById("repeatRightInput").value) || 0;
  const count = parseInt(document.getElementById("repeatCountInput").value, 10);

  const flashError = (msg) => {
    const original = btn.textContent;
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = original; }, 2000);
  };

  if (down === 0 && right === 0) {
    flashError("Enter a down and/or right offset first");
    return;
  }
  if (!count || count < 1 || isNaN(count)) {
    flashError("Enter how many to generate");
    return;
  }

  const feature = activeFeature;
  const created = repeatFeature(feature, down, right, count);
  renderAnnotationsList();

  if (created.length === 1) {
    openEditor(created[0]);
  } else {
    closeEditor();
  }
};


// ==========================
// RULER (measure distance between two points)
// ==========================

let measureDraw = null;
let measureTooltipEl = null;
let measureTooltipOverlay = null;
let measureTooltips = [];

function formatLength(geometry) {
  const length = ol.sphere.getLength(geometry);
  if (length > 1000) return (length / 1000).toFixed(2) + " km";
  return length.toFixed(1) + " m";
}

function createMeasureTooltip() {
  measureTooltipEl = document.createElement("div");
  measureTooltipEl.className = "measure-tooltip";
  measureTooltipOverlay = new ol.Overlay({
    element: measureTooltipEl,
    offset: [0, -10],
    positioning: "bottom-center",
    stopEvent: false
  });
  map.addOverlay(measureTooltipOverlay);
  measureTooltips.push(measureTooltipOverlay);
}

function activateRuler(btn) {
  clearInteractions();
  closeEditor();
  createMeasureTooltip();
  showPlacementHint("Click two points to measure distance");

  measureDraw = new ol.interaction.Draw({
    source: measureSource,
    type: "LineString",
    minPoints: 2,
    maxPoints: 2
  });

  measureDraw.on("drawstart", (evt) => {
    measureSource.getFeatures().forEach((f) => {
      if (f !== evt.feature) measureSource.removeFeature(f);
    });
    measureTooltips.forEach((ov) => {
      if (ov !== measureTooltipOverlay) map.removeOverlay(ov);
    });
    measureTooltips = [measureTooltipOverlay];

    const sketchGeom = evt.feature.getGeometry();
    sketchGeom.on("change", (e) => {
      const geom = e.target;
      const coords = geom.getCoordinates();
      measureTooltipEl.textContent = formatLength(geom);
      measureTooltipOverlay.setPosition(coords[coords.length - 1]);
    });
  });

  measureDraw.on("drawend", (evt) => {
    const finishedEl = measureTooltipEl;
    finishedEl.textContent = formatLength(evt.feature.getGeometry());
    createMeasureTooltip();
  });

  map.addInteraction(measureDraw);
  setActiveButton(btn);
}

function clearMeasurements() {
  measureSource.clear();
  measureTooltips.forEach((ov) => map.removeOverlay(ov));
  measureTooltips = [];
  measureTooltipEl = null;
  measureTooltipOverlay = null;
  if (measureDraw) createMeasureTooltip();
}

document.getElementById("tool-ruler").onclick = (e) => activateRuler(e.currentTarget);


// ==========================
// TEMPERATURE PICKER ("See temperature" tool)
// ==========================

// Clicking the Temp button arms "temperature mode": the next click(s) on
// the map query the raw pixel value at that lon/lat via TiTiler's /cog/point
// endpoint and show it in a small popup. Stays active until another tool
// is picked, so you can click multiple spots in a row.
let temperatureModeActive = false;
let tempPopupEl = null;
let tempPopupOverlay = null;

function createTempPopup() {
  tempPopupEl = document.createElement("div");
  tempPopupEl.className = "temp-popup";
  tempPopupOverlay = new ol.Overlay({
    element: tempPopupEl,
    offset: [0, -14],
    positioning: "bottom-center",
    stopEvent: false
  });
  map.addOverlay(tempPopupOverlay);
}

async function handleTemperatureClick(coordinate) {
  const lonLat = ol.proj.toLonLat(coordinate);
  const [lon, lat] = lonLat;

  if (!tempPopupOverlay) createTempPopup();
  tempPopupEl.className = "temp-popup loading";
  tempPopupEl.textContent = "Reading...";
  tempPopupOverlay.setPosition(coordinate);

  try {
    const res = await fetch(
      `${TITILER_BASE}/cog/point/${lon},${lat}?url=${encodeURIComponent(COG_URL)}`
    );
    if (!res.ok) throw new Error("point query failed");
    const data = await res.json();
    const value = data.values && data.values[0];

    tempPopupEl.className = "temp-popup";
    if (value === null || value === undefined) {
      tempPopupEl.textContent = "No data here";
    } else {
      tempPopupEl.textContent = `${value.toFixed(1)}°C`;
    }
  } catch (err) {
    tempPopupEl.className = "temp-popup";
    tempPopupEl.textContent = "Error reading value";
  }
}

function activateTemperatureTool(btn) {
  clearInteractions();
  closeEditor();
  temperatureModeActive = true;
  if (!tempPopupOverlay) createTempPopup();
  showPlacementHint("Click anywhere on the thermal layer to see the temperature");
  setActiveButton(btn);
  document.getElementById("legend").classList.add("open");
}

function deactivateTemperatureTool() {
  temperatureModeActive = false;
  if (tempPopupOverlay) {
    map.removeOverlay(tempPopupOverlay);
    tempPopupOverlay = null;
    tempPopupEl = null;
  }
  document.getElementById("legend").classList.remove("open");
  hidePlacementHint();
}

document.getElementById("tool-temperature").onclick = (e) => activateTemperatureTool(e.currentTarget);


// ==========================
// LEGEND (matches the custom colormap + real value range)
// ==========================

document.getElementById("legendBar").style.background = legendGradientCss;
document.getElementById("legendMin").textContent = VMIN;
document.getElementById("legendMax").textContent = VMAX;


// ==========================
// TOOLS: select + draw
// ==========================

const selectInteraction = new ol.interaction.Select({
  layers: [vectorLayer]
});
selectInteraction.on("select", (e) => {
  if (e.selected.length > 0) {
    openEditor(e.selected[0]);
  } else {
    closeEditor();
  }
});

const modifyInteraction = new ol.interaction.Modify({ source: vectorSource });
const translateInteraction = new ol.interaction.Translate({ layers: [vectorLayer] });

function refreshEditorForFeature(feature) {
  if (activeFeature !== feature) return;
  editorOverlay.setPosition(getFeatureAnchor(feature));
  if (feature.getGeometry().getType() === "Point") {
    const lonLat = ol.proj.toLonLat(feature.getGeometry().getCoordinates());
    document.getElementById("coordsText").textContent =
      lonLat[1].toFixed(6) + ", " + lonLat[0].toFixed(6);
  }
}

modifyInteraction.on("modifyend", (e) => {
  e.features.forEach((f) => refreshEditorForFeature(f));
});
translateInteraction.on("translateend", (e) => {
  e.features.forEach((f) => refreshEditorForFeature(f));
});

let drawInteraction = null;
let activeToolBtn = null;

function setActiveButton(btn) {
  if (activeToolBtn) activeToolBtn.classList.remove("active");
  activeToolBtn = btn;
  if (activeToolBtn) activeToolBtn.classList.add("active");
}

function clearInteractions() {
  if (drawInteraction) {
    map.removeInteraction(drawInteraction);
    drawInteraction = null;
  }
  if (measureDraw) {
    map.removeInteraction(measureDraw);
    measureDraw = null;
    hidePlacementHint();
    clearMeasurements();
  }
  if (temperatureModeActive) {
    deactivateTemperatureTool();
  }
  map.removeInteraction(selectInteraction);
  map.removeInteraction(modifyInteraction);
  map.removeInteraction(translateInteraction);
}

function activateSelect(btn) {
  clearInteractions();
  map.addInteraction(selectInteraction);
  map.addInteraction(modifyInteraction);
  map.addInteraction(translateInteraction);
  setActiveButton(btn);
}

function activateDraw(type, btn) {
  clearInteractions();
  closeEditor();

  let geometryType = type;
  if (type === "Rectangle") geometryType = "Circle";

  drawInteraction = new ol.interaction.Draw({
    source: vectorSource,
    type: geometryType,
    geometryFunction: type === "Rectangle" ? ol.interaction.Draw.createBox() : undefined
  });

  drawInteraction.on("drawend", (e) => {
    e.feature.set("color", currentColor);
    e.feature.set("shape", type);
    setTimeout(() => openEditor(e.feature), 0);
  });

  map.addInteraction(drawInteraction);
  setActiveButton(btn);
}

function nextAnnotationNumber(shape, label) {
  let max = 0;
  const re = new RegExp("^" + label + " (\\d+)$");
  vectorSource.getFeatures().forEach((f) => {
    const m = re.exec(f.get("name") || "");
    if (m) max = Math.max(max, parseInt(m[1], 10));
  });
  return max + 1;
}

function activateLineTool(shape, label, btn) {
  clearInteractions();
  closeEditor();

  drawInteraction = new ol.interaction.Draw({
    source: vectorSource,
    type: "LineString",
    minPoints: 2,
    maxPoints: 2
  });

  drawInteraction.on("drawend", (e) => {
    e.feature.set("color", currentColor);
    e.feature.set("shape", shape);
    e.feature.set("name", label + " " + nextAnnotationNumber(shape, label));
    e.feature.set("description", []);
    setTimeout(() => openEditor(e.feature), 0);
  });

  map.addInteraction(drawInteraction);
  setActiveButton(btn);
}

function activateRowTool(btn) {
  activateLineTool("Row", "Row", btn);
}

function activateColumnTool(btn) {
  activateLineTool("Column", "Column", btn);
}

document.getElementById("tool-select").onclick = (e) => activateSelect(e.currentTarget);
document.getElementById("tool-point").onclick = (e) => activateDraw("Point", e.currentTarget);
document.getElementById("tool-line").onclick = (e) => activateDraw("LineString", e.currentTarget);
document.getElementById("tool-polygon").onclick = (e) => activateDraw("Polygon", e.currentTarget);
document.getElementById("tool-rectangle").onclick = (e) => activateDraw("Rectangle", e.currentTarget);
document.getElementById("tool-circle").onclick = (e) => activateDraw("Circle", e.currentTarget);
document.getElementById("tool-row").onclick = (e) => activateRowTool(e.currentTarget);
document.getElementById("tool-column").onclick = (e) => activateColumnTool(e.currentTarget);

// start in select mode
activateSelect(document.getElementById("tool-select"));


// ==========================
// COLOR PICKER
// ==========================

const colorInput = document.getElementById("colorInput");
const colorSwatch = document.getElementById("colorSwatch");

document.getElementById("colorBtn").onclick = () => colorInput.click();
colorInput.oninput = function () {
  currentColor = this.value;
  colorSwatch.style.background = currentColor;
};


// ==========================
// UNDO / REDO (add + delete of whole features)
// ==========================

let undoStack = [];
let redoStack = [];
let suppressHistory = false;

vectorSource.on("addfeature", (e) => {
  if (suppressHistory) return;
  undoStack.push({ type: "add", feature: e.feature });
  redoStack = [];
});

vectorSource.on("removefeature", (e) => {
  if (suppressHistory) return;
  undoStack.push({ type: "remove", feature: e.feature });
  redoStack = [];
});

document.getElementById("tool-undo").onclick = () => {
  const action = undoStack.pop();
  if (!action) return;
  suppressHistory = true;
  if (action.type === "add") {
    vectorSource.removeFeature(action.feature);
  } else {
    vectorSource.addFeature(action.feature);
  }
  suppressHistory = false;
  redoStack.push(action);
  closeEditor();
};

document.getElementById("tool-redo").onclick = () => {
  const action = redoStack.pop();
  if (!action) return;
  suppressHistory = true;
  if (action.type === "add") {
    vectorSource.addFeature(action.feature);
  } else {
    vectorSource.removeFeature(action.feature);
  }
  suppressHistory = false;
  undoStack.push(action);
  closeEditor();
};


// ==========================
// CLEAR / EXPORT
// ==========================

document.getElementById("tool-clear").onclick = function () {
  vectorSource.clear();
  clearMeasurements();
  undoStack = [];
  redoStack = [];
  closeEditor();
};

document.getElementById("tool-export").onclick = function () {
  const format = new ol.format.GeoJSON();
  const data = format.writeFeatures(vectorSource.getFeatures(), {
    featureProjection: "EPSG:3857"
  });
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "annotations.geojson";
  a.click();
};


// ==========================
// ANNOTATIONS LIST PANEL
// ==========================

function shapeIcon(shape) {
  switch (shape) {
    case "Point": return "📍";
    case "LineString": return "📏";
    case "Row": return "📏";
    case "Column": return "📶";
    case "Polygon": return "⬡";
    case "Rectangle": return "▭";
    case "Circle": return "⭕";
    default: return "•";
  }
}

const GROUP_ORDER = ["Point", "Row", "Column", "LineString", "Polygon", "Rectangle", "Circle"];
const GROUP_LABEL = {
  Point: "Points",
  Row: "Rows",
  Column: "Columns",
  LineString: "Lines",
  Polygon: "Polygons",
  Rectangle: "Rectangles",
  Circle: "Circles",
  Other: "Other"
};
const collapsedGroups = {};

function buildAnnItem(feature) {
  const item = document.createElement("div");
  item.className = "ann-item";

  const swatch = document.createElement("span");
  swatch.className = "ann-swatch";
  swatch.style.background = feature.get("color") || currentColor;

  const name = document.createElement("span");
  const nameVal = feature.get("name");
  name.className = "ann-name" + (nameVal ? "" : " untitled");
  name.textContent = nameVal || ("Untitled " + (GROUP_LABEL[feature.get("shape")] || "shape").replace(/s$/, ""));

  const visBtn = document.createElement("button");
  const isHidden = !!feature.get("hidden");
  visBtn.className = "ann-btn hidden-toggle" + (isHidden ? " is-hidden" : "");
  visBtn.title = isHidden ? "Show on map" : "Hide from map";
  visBtn.textContent = isHidden ? "🙈" : "👁";
  visBtn.onclick = (evt) => {
    evt.stopPropagation();
    feature.set("hidden", !feature.get("hidden"));
    vectorLayer.changed();
    renderAnnotationsList();
  };

  const delBtn = document.createElement("button");
  delBtn.className = "ann-btn ann-delete";
  delBtn.title = "Delete";
  delBtn.textContent = "\u00d7";
  delBtn.onclick = (evt) => {
    evt.stopPropagation();
    vectorSource.removeFeature(feature);
  };

  item.appendChild(swatch);
  item.appendChild(name);
  item.appendChild(visBtn);
  item.appendChild(delBtn);

  item.onclick = () => {
    map.getView().animate({ center: getFeatureAnchor(feature), duration: 300 });
    openEditor(feature);
  };

  return item;
}

function renderAnnotationsList() {
  const container = document.getElementById("annotationsList");
  const features = vectorSource.getFeatures();
  container.innerHTML = "";

  if (features.length === 0) {
    const empty = document.createElement("div");
    empty.id = "annotationsEmpty";
    empty.textContent = "No annotations yet.";
    container.appendChild(empty);
    return;
  }

  const groups = {};
  features.forEach((f) => {
    const key = f.get("shape") || "Other";
    if (!groups[key]) groups[key] = [];
    groups[key].push(f);
  });

  const orderedKeys = GROUP_ORDER.filter((k) => groups[k]).concat(
    Object.keys(groups).filter((k) => !GROUP_ORDER.includes(k))
  );

  orderedKeys.forEach((key) => {
    const groupFeatures = groups[key];
    const groupEl = document.createElement("div");
    groupEl.className = "ann-group" + (collapsedGroups[key] ? " collapsed" : "");

    const header = document.createElement("div");
    header.className = "ann-group-header";
    header.innerHTML =
      '<span class="chevron">▾</span>' +
      '<span>' + shapeIcon(key) + '</span>' +
      '<span>' + (GROUP_LABEL[key] || key) + '</span>' +
      '<span class="ann-group-count">' + groupFeatures.length + '</span>';
    header.onclick = () => {
      collapsedGroups[key] = !collapsedGroups[key];
      renderAnnotationsList();
    };

    const itemsEl = document.createElement("div");
    itemsEl.className = "ann-group-items";
    groupFeatures.forEach((f) => itemsEl.appendChild(buildAnnItem(f)));

    groupEl.appendChild(header);
    groupEl.appendChild(itemsEl);
    container.appendChild(groupEl);
  });
}

vectorSource.on("addfeature", renderAnnotationsList);
vectorSource.on("removefeature", renderAnnotationsList);

document.getElementById("listToggle").onclick = function () {
  this.classList.toggle("active");
  document.getElementById("annotationsPanel").classList.toggle("open");
};

document.getElementById("rowColOpacityInput").oninput = function () {
  rowColOpacity = Number(this.value);
  vectorLayer.changed();
};

renderAnnotationsList();


// ==========================
// THERMAL CONTROLS
// ==========================

document.getElementById("opacity").oninput = function () {
  thermalLayer.setOpacity(Number(this.value));
};

document.getElementById("brightness").oninput = function () {
  brightness = Number(this.value);
  thermalLayer.changed();
};

document.getElementById("contrast").oninput = function () {
  contrast = Number(this.value);
  thermalLayer.changed();
};

document.getElementById("resetOpacity").onclick = function () {
  document.getElementById("opacity").value = 1;
  thermalLayer.setOpacity(1);
};

document.getElementById("resetBrightness").onclick = function () {
  brightness = 0;
  document.getElementById("brightness").value = 0;
  thermalLayer.changed();
};

document.getElementById("resetContrast").onclick = function () {
  contrast = 100;
  document.getElementById("contrast").value = 100;
  thermalLayer.changed();
};

document.getElementById("settingsToggle").onclick = function () {
  document.getElementById("thermalPanel").classList.toggle("open");
};

document.getElementById("fullscreenBtn").onclick = function () {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};

</script>
